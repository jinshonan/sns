<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Idea | Idea Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body class="page-ideas">

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-left">
        <h1>💡 Idea Hub</h1>
    </div>

    <div class="nav-right">
        <a href="{{ url_for('main.ideas') }}" class="btn create-btn">← Back</a>
        <a href="{{ url_for('main.login') }}" class="btn logout-btn">Logout</a>
    </div>
</nav>

<div class="create-container">

    <div class="create-card">
        <h2>Share a New Idea</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">

            <div class="input-group">
                <input type="text" name="title" value="{{ idea.title }}" required>
                <label>Idea Title</label>
            </div>

            <div class="textarea-group">
                <textarea name="content" required>{{ idea.content }}</textarea>
                <label>Describe your idea</label>
            </div>

            <button type="submit">Submit Idea 🚀</button>

        </form>
    </div>

</div>

</body>
</html>
